name: CI

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install modules
        run: npm i
      - name: Run ESLint
        run: npm run lint:check
      - name: Run tests
        run: npm test
