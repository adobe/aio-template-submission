name: Template Removal Request
description: Request template removal
labels: [remove-template]
body:
  - type: input
    id: npm_name
    attributes:
      label: "npm package name"
    validations:
      required: true
  - type: textarea
    id: ownership-proof
    attributes:
      label: Ownership Verification
      description: |
        **Admin verification required**

        Please provide proof that you maintain this package:
        - Your NPM username
        - Link to NPM package page
        - Output of: `npm owner ls <package-name>`

        This helps admins verify your request quickly.
      placeholder: |
        NPM username: my-npm-username
        Package link: https://www.npmjs.com/package/@example/my-template
        Maintainers: (output of npm owner ls command)
        Reason for removal: No longer maintaining this package
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ---

        **Note:** Template removal requires admin approval for security reasons.
        An admin will review your request and verify ownership before processing.
